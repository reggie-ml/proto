version: v2
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/go
    opt: paths=source_relative
  - remote: buf.build/protocolbuffers/python
    out: gen/python/reggie_proto
  - remote: buf.build/grpc/python
    out: gen/python/reggie_proto
  - remote: buf.build/protocolbuffers/pyi
    out: gen/python/reggie_proto
