name: Generate & Release

on:
  pull_request:
    paths: ["*.proto", "VERSION", "buf.yaml", "buf.gen.yaml"]
  push:
    branches: ["master"]
    paths: ["VERSION"]

jobs:
  generate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install buf
        run: |
          curl -sSL https://github.com/bufbuild/buf/releases/latest/download/buf-Linux-x86_64 -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Lint
        run: buf lint

      - name: Check for breaking changes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -n "$PREV_TAG" ]; then
            echo "Checking breaking changes against $PREV_TAG"
            buf breaking --against ".git#tag=$PREV_TAG"
          else
            echo "No previous release tag found, skipping breaking change check."
          fi

      - name: Fail if this VERSION was already released
        run: |
          if git rev-parse -q --verify "refs/tags/v$(cat VERSION)" >/dev/null; then
            echo "Tag v$(cat VERSION) already exists. Bump the VERSION file in this PR." >&2
            exit 1
          fi

      - name: Generate
        run: make generate

      - name: Fix Python package import and sync version
        run: |
          sed -i 's/^import workers_pb2 as/from reggie_proto import workers_pb2 as/' \
            gen/python/reggie_proto/workers_pb2_grpc.py
          sed -i "s/^version = \".*\"/version = \"$(cat VERSION)\"/" \
            gen/python/pyproject.toml

      - name: Commit regenerated code to the PR branch
        run: |
          cd gen/go
          go mod tidy
          cd ../..
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add gen/
          if git diff --staged --quiet; then
            echo "No regeneration changes to commit."
          else
            git commit -m "regenerate proto"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

  tag:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION="v$(cat VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "go_version=gen/go/$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tag the release
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.version }}" >/dev/null; then
            echo "Tag ${{ steps.version.outputs.version }} already exists, nothing to do."
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag "${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.go_version }}"
          git push origin "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.go_version }}"
